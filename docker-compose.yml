version: "3.9"

# Minimal docker-compose for testing Docker build locally
# Database: Uses GCP Cloud SQL (via Cloud SQL Proxy or direct connection)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: femtech_app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped


